    MerchantClaimCreateResponse:
      type: object
      properties:
        claim_id:
          type: string
        quote_id:
          type: string
        valid_from:
          type: string
          format: date-time
        valid_to:
          type: string
          format: date-time
        rate:
          type: string
        denomination_currency:
          type: string
        funding_currency:
          type: string
        denomination_amount:
          type: string
        funding_amount:
          type: string
        funding_details:
          $ref: "#/components/schemas/FundingDetails"

    MerchantClaimQuoteRefreshRequest:
