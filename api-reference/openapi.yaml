          type: string
        received:
          type: boolean
        received_at:
          type: string
          format: date-time
        released:
          type: boolean
        released_at:
          type: string
          format: date-time
        fulfilled:
          type: boolean
        fulfilled_at:
          type: string
          format: date-time
        receiver_user_id:
          type: string
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/PaymentAllocation"

    PaymentAllocation:
      type: object
      properties:
